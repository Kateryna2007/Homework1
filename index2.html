<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            background-color: #e0e0e0;
            padding: 5px 10px;
            margin: 2px;
            font-size: 24px;
            font-family: sans-serif;
            display: inline-block;
        }
        .red { color: darkred; }
    </style>
</head>
<body>
    <p>Player 1:</p>
    <div>
        <span class="card">2&clubs;</span>
        <span class="card red">9&hearts;</span>
        <span class="card red">6&hearts;</span>
        <span class="card red">A&diams;</span>
        <span class="card">Q&spades;</span>
        <span class="card">J&clubs;</span>
    </div>

    <p>Player 2:</p>
    <div>
        <span class="card red">3&hearts;</span>
        <span class="card">A&clubs;</span>
        <span class="card">10&clubs;</span>
        <span class="card red">K&diams;</span>
        <span class="card">8&spades;</span>
        <span class="card red">3&hearts;</span>
    </div>
</body>
</html>
